name = "teaching-api"
main = "src/index.ts"
compatibility_date = "2026-04-02"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "teaching-db"
database_id = "da67407a-abe8-4492-8d94-38041b279730"
migrations_dir = "src/db/migrations"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "teaching-storage"

[durable_objects]
bindings = [
  { name = "NOTIFICATION_HUB", class_name = "NotificationHub" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["NotificationHub"]

# All vars/secrets are managed via Cloudflare Dashboard (prod) or .dev.vars (local)
# Required vars: CLERK_PUBLISHABLE_KEY, CORS_ORIGIN
# Required secrets: CLERK_SECRET_KEY, CLERK_WEBHOOK_SECRET
