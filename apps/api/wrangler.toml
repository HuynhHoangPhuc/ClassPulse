name = "teaching-api"
main = "src/index.ts"
compatibility_date = "2024-09-25"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "teaching-db"
database_id = "local"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "teaching-storage"

[durable_objects]
bindings = [
  { name = "NOTIFICATION_HUB", class_name = "NotificationHub" }
]

[[migrations]]
tag = "v1"
new_classes = ["NotificationHub"]

[vars]
CLERK_PUBLISHABLE_KEY = ""
CORS_ORIGIN = "http://localhost:5173"
# CLERK_SECRET_KEY, CLERK_WEBHOOK_SECRET: use `wrangler secret put` or .dev.vars
